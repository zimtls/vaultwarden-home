---
# =============================================================================
# Déploiement Vaultwarden — Podman rootless + Quadlet systemd
# Cible : Rocky Linux 9/10 (compatible RHEL-family, podman >= 4.4)
# Accès : VPN/LAN only — nginx en frontal TLS, Vaultwarden bindé sur loopback
# =============================================================================
- name: Déployer Vaultwarden (rootless, quadlet)
  hosts: vaultwarden
  become: true

  vars:
    # --- Identité / réseau ---
    vw_domain: "bitwarden.home.lan"                  # FQDN vu par les clients Bitwarden
    vw_allowed_sources:                          # Sous-réseaux autorisés (rich rules firewalld)
      - 10.100.0.0/24                            # ADM
      - 172.16.1.0/24                            # WireGuard
      - 10.53.0.0/24                             # SecuLab
      - 10.10.0.0/24                             # Wifi
    # --- Utilisateur rootless ---
    vw_user: vaultwarden
    vw_home: /opt/vaultwarden
    # --- Conteneur ---
    vw_image: "docker.io/vaultwarden/server:latest"   # Fige un tag en prod, ex: 1.34.1
    vw_bind: "127.0.0.1:8080"
    # --- Config applicative ---
    vw_signups_allowed: "true"                   # Passer à false après création des comptes
    vw_admin_token: ""                           # Vide = admin panel désactivé (recommandé)
    # --- ACME (émission automatique via ton Vault PKI) ---
    vw_acme_enabled: true
    vw_acme_server: "https://vault.home.lan:8200/v1/pki_int/acme/directory"
    vw_acme_vault_ip: "10.53.0.X"                # IP du serveur Vault (validation HTTP-01) — À ADAPTER
    vw_acme_ca_cert_src: ""                      # Chemin local (contrôleur) de ta chaîne CA à injecter
                                                 # dans le trust store, ex: files/ca-chain.pem. Vide = skip
    # --- TLS ---
    # Si ACME activé : chemins certbot. Sinon : certificat déposé manuellement.
    vw_tls_cert: "{{ '/etc/letsencrypt/live/' + vw_domain + '/fullchain.pem' if vw_acme_enabled else '/etc/pki/tls/certs/' + vw_domain + '.crt' }}"
    vw_tls_key: "{{ '/etc/letsencrypt/live/' + vw_domain + '/privkey.pem' if vw_acme_enabled else '/etc/pki/tls/private/' + vw_domain + '.key' }}"
    # --- Backup ---
    vw_backup_dir: /var/backups/vaultwarden
    vw_backup_retention_days: 14
    vw_backup_calendar: "*-*-* 03:30:00"
 
  tasks:
    # -------------------------------------------------------------------------
    # Prérequis système
    # -------------------------------------------------------------------------
    - name: Installer EPEL (requis pour certbot)
      ansible.builtin.dnf:
        name: epel-release
        state: present
      when: vw_acme_enabled
 
    - name: Installer les paquets requis
      ansible.builtin.dnf:
        name: "{{ ['podman', 'nginx', 'firewalld', 'sqlite',
                   'policycoreutils-python-utils', 'tar']
                  + (['certbot'] if vw_acme_enabled else []) }}"
        state: present
 
    - name: Activer firewalld
      ansible.builtin.systemd_service:
        name: firewalld
        state: started
        enabled: true
 
    # -------------------------------------------------------------------------
    # Utilisateur rootless dédié
    # -------------------------------------------------------------------------
    - name: Créer l'utilisateur de service {{ vw_user }}
      ansible.builtin.user:
        name: "{{ vw_user }}"
        home: "{{ vw_home }}"
        create_home: true
        shell: /sbin/nologin
        system: false            # UID standard requis pour subuid/subgid
      register: vw_user_info
 
    - name: Vérifier la présence des plages subuid/subgid
      ansible.builtin.lineinfile:
        path: "{{ item }}"
        line: "{{ vw_user }}:200000:65536"
        regexp: "^{{ vw_user }}:"
        create: true
        mode: "0644"
      loop:
        - /etc/subuid
        - /etc/subgid
      notify: Migrer podman rootless
 
    - name: Activer le lingering (services user au boot sans session)
      ansible.builtin.command: loginctl enable-linger {{ vw_user }}
      args:
        creates: "/var/lib/systemd/linger/{{ vw_user }}"
 
    - name: Créer l'arborescence de données et quadlet
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ vw_user }}"
        group: "{{ vw_user }}"
        mode: "0750"
      loop:
        - "{{ vw_home }}/data"
        - "{{ vw_home }}/.config/containers/systemd"
 
    # -------------------------------------------------------------------------
    # Quadlet Vaultwarden (unité systemd user générée par podman)
    # -------------------------------------------------------------------------
    - name: Déployer le quadlet vaultwarden.container
      ansible.builtin.template:
        src: templates/vaultwarden.container.j2
        dest: "{{ vw_home }}/.config/containers/systemd/vaultwarden.container"
        owner: "{{ vw_user }}"
        group: "{{ vw_user }}"
        mode: "0640"
      notify: Redémarrer vaultwarden
 
    - name: Recharger systemd user et démarrer vaultwarden
      become_user: "{{ vw_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ vw_user_info.uid }}"
        DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ vw_user_info.uid }}/bus"
      ansible.builtin.systemd_service:
        name: vaultwarden.service
        state: started
        scope: user
        daemon_reload: true
 
    # -------------------------------------------------------------------------
    # ACME — émission du certificat via le Vault PKI (HTTP-01 standalone)
    # -------------------------------------------------------------------------
    - name: Émission du certificat ACME
      when: vw_acme_enabled
      block:
        - name: Injecter la chaîne CA dans le trust store système
          ansible.builtin.copy:
            src: "{{ vw_acme_ca_cert_src }}"
            dest: /etc/pki/ca-trust/source/anchors/homelab-ca-chain.pem
            mode: "0644"
          when: vw_acme_ca_cert_src | length > 0
          notify: Mettre à jour le trust store
 
        - name: Forcer la mise à jour du trust store avant certbot
          ansible.builtin.meta: flush_handlers
 
        - name: Autoriser HTTP-01 depuis le serveur Vault uniquement
          ansible.posix.firewalld:
            rich_rule: 'rule family="ipv4" source address="{{ vw_acme_vault_ip }}/32" port port="80" protocol="tcp" accept'
            zone: public
            permanent: true
            immediate: true
            state: enabled
 
        - name: Émettre le certificat (si absent)
          ansible.builtin.command: >
            certbot certonly --standalone --non-interactive --agree-tos
            --server {{ vw_acme_server }}
            --register-unsafely-without-email
            -d {{ vw_domain }}
          args:
            creates: "/etc/letsencrypt/live/{{ vw_domain }}/fullchain.pem"
          environment:
            REQUESTS_CA_BUNDLE: /etc/pki/tls/certs/ca-bundle.crt
 
        - name: Déployer le hook de reload nginx post-renouvellement
          ansible.builtin.copy:
            dest: /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh
            mode: "0750"
            content: |
              #!/usr/bin/env bash
              systemctl reload nginx
 
        - name: Activer le timer de renouvellement certbot
          ansible.builtin.systemd_service:
            name: certbot-renew.timer
            state: started
            enabled: true
 
    # -------------------------------------------------------------------------
    # Reverse proxy nginx (TLS, host-level)
    # -------------------------------------------------------------------------
    - name: Déployer la vhost nginx
      ansible.builtin.template:
        src: templates/nginx-vaultwarden.conf.j2
        dest: /etc/nginx/conf.d/vaultwarden.conf
        mode: "0644"
      notify: Recharger nginx
 
    - name: Autoriser nginx à se connecter au backend (SELinux)
      ansible.posix.seboolean:
        name: httpd_can_network_connect
        state: true
        persistent: true
 
    - name: Activer nginx
      ansible.builtin.systemd_service:
        name: nginx
        state: started
        enabled: true
 
    # -------------------------------------------------------------------------
    # Firewalld — HTTPS restreint aux sources LAN/VPN
    # -------------------------------------------------------------------------
    - name: Rich rules HTTPS pour les sources autorisées
      ansible.posix.firewalld:
        rich_rule: 'rule family="ipv4" source address="{{ item }}" service name="https" accept'
        zone: public
        permanent: true
        immediate: true
        state: enabled
      loop: "{{ vw_allowed_sources }}"
 
    - name: S'assurer que le service https n'est PAS ouvert globalement
      ansible.posix.firewalld:
        service: https
        zone: public
        permanent: true
        immediate: true
        state: disabled
 
    # -------------------------------------------------------------------------
    # Backup — dump SQLite cohérent + archive, systemd timer
    # -------------------------------------------------------------------------
    - name: Créer le répertoire de backup
      ansible.builtin.file:
        path: "{{ vw_backup_dir }}"
        state: directory
        owner: "{{ vw_user }}"
        group: "{{ vw_user }}"
        mode: "0750"
 
    - name: Déployer le script de backup
      ansible.builtin.template:
        src: templates/vaultwarden-backup.sh.j2
        dest: /usr/local/sbin/vaultwarden-backup.sh
        mode: "0750"
        owner: root
        group: root
 
    - name: Déployer service + timer de backup
      ansible.builtin.template:
        src: "templates/{{ item }}.j2"
        dest: "/etc/systemd/system/{{ item }}"
        mode: "0644"
      loop:
        - vaultwarden-backup.service
        - vaultwarden-backup.timer
      notify: Activer le timer de backup
 
  handlers:
    - name: Mettre à jour le trust store
      ansible.builtin.command: update-ca-trust
      changed_when: true
 
    - name: Migrer podman rootless
      become_user: "{{ vw_user }}"
      ansible.builtin.command: podman system migrate
      changed_when: true
 
    - name: Redémarrer vaultwarden
      become_user: "{{ vw_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ vw_user_info.uid }}"
        DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ vw_user_info.uid }}/bus"
      ansible.builtin.systemd_service:
        name: vaultwarden.service
        state: restarted
        scope: user
        daemon_reload: true
 
    - name: Recharger nginx
      ansible.builtin.systemd_service:
        name: nginx
        state: reloaded
 
    - name: Activer le timer de backup
      ansible.builtin.systemd_service:
        name: vaultwarden-backup.timer
        state: started
        enabled: true
        daemon_reload: true
